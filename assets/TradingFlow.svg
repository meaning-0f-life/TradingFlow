<svg width="420" height="220" viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0B0F1A"/>

  <defs>
    <style>
      .edge { stroke:#38BDF8; stroke-width:3; }
      .node { fill:#38BDF8; }
    </style>
  </defs>

  <!-- T -->
  <line class="edge" x1="90" y1="60" x2="330" y2="60"/>
  <line class="edge" x1="210" y1="60" x2="210" y2="170"/>

  <!-- F -->
  <line class="edge" x1="210" y1="95" x2="270" y2="95"/>
  
  <!-- Nodes -->
  <circle class="node" cx="90" cy="60" r="6"/>
  <circle class="node" cx="210" cy="60" r="6"/>
  <circle class="node" cx="330" cy="60" r="6"/>
  <circle class="node" cx="210" cy="170" r="6"/>
  <circle class="node" cx="270" cy="95" r="6"/>
</svg>
